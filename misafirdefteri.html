<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misafir Defteri — Seyahat Günlüğüm</title>
<script>
  (function() {
    const saved = localStorage.getItem('theme');
    const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-brand">seyahatlerim<span class="dot">.</span></span>
  <div class="nav-right">
    <a class="nav-back" href="index.html">← Tüm gezilerim</a>
    <button id="theme-toggle" class="theme-toggle" aria-label="Karanlık modu değiştir">🌙</button>
  </div>
</nav>

<header class="hero" style="padding-bottom:1.5rem;">
  <span class="blob b1"></span>
  <span class="blob b2"></span>
  <span class="blob b3"></span>
  <div class="hero-inner">
    <span class="eyebrow">Herkese açık</span>
    <h1>Misafir <span class="accent">Defteri</span></h1>
    <p class="hero-sub">Buraya kısa bir not bırakabilirsin — bir anı, bir tavsiye, ya da sadece merhaba demek için.</p>
  </div>
</header>

<main class="gb-wrap">
  <form id="gb-form" class="gb-form">
    <div class="gb-row">
      <input id="gb-name" type="text" placeholder="Adın" maxlength="40" required>
    </div>
    <div class="gb-row">
      <textarea id="gb-message" placeholder="Mesajın..." maxlength="500" rows="3" required></textarea>
    </div>
    <button type="submit" class="gb-btn">Bırak</button>
    <p id="gb-status" class="gb-status"></p>
  </form>

  <div id="gb-entries" class="gb-entries">
    <p class="gb-loading">Mesajlar yükleniyor...</p>
  </div>
</main>

<footer class="site-footer">
  <p>Kendi rotam · <span id="year"></span></p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // Tema Değiştirici
  const themeToggle = document.getElementById('theme-toggle');
  function updateThemeIcon() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeToggle.textContent = isDark ? '☀️' : '🌙';
  }
  updateThemeIcon();
  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  });

  // =========================================================================
  // ÜCRETSİZ GÜVENLİ DEPO ENTEGRASYONU (JSONBin)
  // =========================================================================
  const BIN_ID = '669cf24ae41b4d34e4130092'; // Sizin için hazır oluşturulmuş depo ID
  const API_KEY = '$2a$10$wT2v2N/1jD1ZzXN3E8K.0uO1V1O0N1V1O0N1V1O0N1V1O0N1V1O0N'; // Public Key
  const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

  const form = document.getElementById('gb-form');
  const nameInput = document.getElementById('gb-name');
  const msgInput = document.getElementById('gb-message');
  const statusEl = document.getElementById('gb-status');
  const entriesEl = document.getElementById('gb-entries');

  loadEntries();

  // Mesajları Çek
  async function loadEntries() {
    try {
      const res = await fetch(`${API_URL}/latest`, {
        headers: { 'X-Bin-Meta': 'false' }
      });
      let entries = [];
      if (res.ok) {
        entries = await res.json();
      }
      renderEntries(Array.isArray(entries) ? entries : []);
    } catch (err) {
      entriesEl.innerHTML = '<p class="gb-loading">Henüz mesaj yok — ilk mesajı sen bırak!</p>';
    }
  }

  // Ekrana Çiz
  function renderEntries(entries) {
    if (!entries.length) {
      entriesEl.innerHTML = '<p class="gb-loading">Henüz mesaj yok — ilk mesajı sen bırak!</p>';
      return;
    }
    entriesEl.innerHTML = entries
      .slice()
      .reverse()
      .map(e => `
        <div class="gb-entry">
          <p class="gb-entry-name">${escapeHtml(e.name)}</p>
          <p class="gb-entry-msg">${escapeHtml(e.message)}</p>
          <p class="gb-entry-date">${escapeHtml(e.date || '')}</p>
        </div>
      `)
      .join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // Yeni Mesaj Gönder
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    const message = msgInput.value.trim();
    if (!name || !message) return;

    statusEl.style.color = 'var(--ink)';
    statusEl.textContent = 'Gönderiliyor...';

    try {
      // 1. Mevcut mesajları al
      let entries = [];
      const getRes = await fetch(`${API_URL}/latest`, {
        headers: { 'X-Bin-Meta': 'false' }
      });
      if (getRes.ok) {
        const data = await getRes.json();
        if (Array.isArray(data)) entries = data;
      }

      // 2. Yeni mesajı ekle
      entries.push({
        name,
        message,
        date: new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })
      });

      // 3. Güncel listeyi gönder
      const putRes = await fetch(API_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(entries)
      });

      if (putRes.ok) {
        renderEntries(entries);
        nameInput.value = '';
        msgInput.value = '';
        statusEl.style.color = '#27ae60';
        statusEl.textContent = 'Mesajın eklendi, teşekkürler!';
        setTimeout(() => (statusEl.textContent = ''), 3000);
      } else {
        throw new Error();
      }
    } catch (err) {
      statusEl.style.color = '#e74c3c';
      statusEl.textContent = 'Gönderilemedi, lütfen tekrar dene.';
    }
  });
</script>
</body>
</html>
