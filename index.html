<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seyahat Günlüğüm</title>
<script>
  (function() {
    const saved = localStorage.getItem('theme');
    const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">seyahatlerim<span class="dot">.</span></span>
  <div class="nav-right">
    <a class="nav-back" href="misafirdefteri.html">✍️ Misafir Defteri</a>
    <button id="theme-toggle" class="theme-toggle" aria-label="Karanlık modu değiştir">🌙</button>
  </div>
</nav>

<header class="hero">
  <span class="blob b1"></span>
  <span class="blob b2"></span>
  <span class="blob b3"></span>
  <div class="hero-inner">
    <span class="eyebrow">Kişisel seyahat arşivi</span>
    <h1>Gittiğim yerler, <span class="accent">anlattığım</span> hikayeler</h1>
    <p class="hero-sub">Haritadaki pinlere tıkla, gezdiğim yerlerin hikayesini oku!</p>
  </div>
</header>

<section class="stats-strip">
  <div class="stat">
    <span class="stat-num" id="stat-cities">0</span>
    <span class="stat-label">Şehir gezildi</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-countries">0</span>
    <span class="stat-label">Ülke gezildi</span>
  </div>
</section>

<section class="map-section">
  <div id="turkiye-map"></div>
</section>

<footer class="site-footer">
  <p>Kendi rotam · <span id="year"></span></p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // Karanlık mod düğmesi
  const themeToggle = document.getElementById('theme-toggle');
  function updateThemeIcon() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeToggle.textContent = isDark ? '☀️' : '🌙';
  }
  updateThemeIcon();
  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  });

  // =========================================================================
  // Haritadaki pinler. Yeni bir yer eklemek için bu listeye bir satır ekle:
  //   { name: 'Yer adı', lat: enlem, lng: boylam, color: '#renk', href: 'sayfa.html', country: 'Ülke adı' }
  // Enlem/boylam öğrenmek için Google Maps'te yere sağ tıklayıp koordinatları kopyalayabilirsin.
  // country belirtmezsen otomatik olarak 'Türkiye' sayılır — istatistik şeridi bunu kullanıyor.
  // =========================================================================
  const yerler = [
    { name: 'Lapseki, Çanakkale', lat: 40.3411, lng: 26.6839, color: '#ffc93c', href: 'lapseki.html', country: 'Türkiye' },
  ];

  // İstatistik şeridi
  document.getElementById('stat-cities').textContent = yerler.length;
  const ulkeSayisi = new Set(yerler.map(y => y.country || 'Türkiye')).size;
  document.getElementById('stat-countries').textContent = ulkeSayisi;

  const map = L.map('turkiye-map', {
    scrollWheelZoom: false,
  }).setView([39.0, 35.2], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap katkıda bulunanlar',
    maxZoom: 18,
  }).addTo(map);

  yerler.forEach(yer => {
    const icon = L.divIcon({
      className: 'map-pin',
      html: `<span style="background:${yer.color}"></span>`,
      iconSize: [26, 26],
      iconAnchor: [13, 26],
    });
    const marker = L.marker([yer.lat, yer.lng], { icon }).addTo(map);
    marker.bindPopup(
      `<strong>${yer.name}</strong><br><a href="${yer.href}">Devamını oku →</a>`
    );
  });
</script>
</body>
</html>
