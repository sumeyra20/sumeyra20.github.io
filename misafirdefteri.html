<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misafir Defteri — Seyahat Günlüğüm</title>
<script>
  (function() {
    const saved = localStorage.getItem('theme');
    const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-brand">seyahatlerim<span class="dot">.</span></span>
  <div class="nav-right">
    <a class="nav-back" href="index.html">← Tüm gezilerim</a>
    <button id="theme-toggle" class="theme-toggle" aria-label="Karanlık modu değiştir">🌙</button>
  </div>
</nav>

<header class="hero" style="padding-bottom:1.5rem;">
  <span class="blob b1"></span>
  <span class="blob b2"></span>
  <span class="blob b3"></span>
  <div class="hero-inner">
    <span class="eyebrow">Herkese açık</span>
    <h1>Misafir <span class="accent">Defteri</span></h1>
    <p class="hero-sub">Buraya kısa bir not bırakabilirsin — bir anı, bir tavsiye, ya da sadece merhaba demek için.</p>
  </div>
</header>

<main class="gb-wrap">
  <form id="gb-form" class="gb-form">
    <div class="gb-row">
      <input id="gb-name" type="text" placeholder="Adın" maxlength="40" required>
    </div>
    <div class="gb-row">
      <textarea id="gb-message" placeholder="Mesajın..." maxlength="500" rows="3" required></textarea>
    </div>
    <button type="submit" class="gb-btn">Bırak</button>
    <p id="gb-status" class="gb-status"></p>
  </form>

  <div id="gb-entries" class="gb-entries">
    <p class="gb-loading">Mesajlar yükleniyor...</p>
  </div>
</main>

<footer class="site-footer">
  <p>Kendi rotam · <span id="year"></span></p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // Tema Değiştirici
  const themeToggle = document.getElementById('theme-toggle');
  function updateThemeIcon() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeToggle.textContent = isDark ? '☀️' : '🌙';
  }
  updateThemeIcon();
  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  });

  // =========================================================================
  // BUCKET & EMAIL TANIMLARI
  // =========================================================================
  const USER_EMAIL = 'sumto1718@gmail.com'; 
  const KVDB_BASE = 'https://kvdb.io';
  const ENTRIES_KEY = 'misafir-defteri';

  const form = document.getElementById('gb-form');
  const nameInput = document.getElementById('gb-name');
  const msgInput = document.getElementById('gb-message');
  const statusEl = document.getElementById('gb-status');
  const entriesEl = document.getElementById('gb-entries');

  // Sayfa açılınca doğrudan mesajları yükle
  loadEntries();

  // Mesajları Yükleme
  async function loadEntries() {
    try {
      const res = await fetch(`${KVDB_BASE}/?email=${encodeURIComponent(USER_EMAIL)}&key=${ENTRIES_KEY}`);
      let entries = [];
      if (res.ok) {
        const text = await res.text();
        entries = text ? JSON.parse(text) : [];
      }
      renderEntries(entries);
    } catch (err) {
      entriesEl.innerHTML = '<p class="gb-loading">Mesajlar yüklenemedi, sayfayı yenilemeyi dener misin?</p>';
    }
  }

  // Mesajları Ekrana Basma
  function renderEntries(entries) {
    if (!entries.length) {
      entriesEl.innerHTML = '<p class="gb-loading">Henüz mesaj yok — ilk mesajı sen bırak!</p>';
      return;
    }
    entriesEl.innerHTML = entries
      .slice()
      .reverse()
      .map(e => `
        <div class="gb-entry">
          <p class="gb-entry-name">${escapeHtml(e.name)}</p>
          <p class="gb-entry-msg">${escapeHtml(e.message)}</p>
          <p class="gb-entry-date">${escapeHtml(e.date || '')}</p>
        </div>
      `)
      .join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // Yeni Mesaj Gönderme
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    const message = msgInput.value.trim();
    if (!name || !message) return;

    statusEl.textContent = 'Gönderiliyor...';
    try {
      // Önce var olanları çek
      const res = await fetch(`${KVDB_BASE}/?email=${encodeURIComponent(USER_EMAIL)}&key=${ENTRIES_KEY}`);
      let entries = [];
      if (res.ok) {
        const text = await res.text();
        entries = text ? JSON.parse(text) : [];
      }

      // Yeni mesajı diziye ekle
      entries.push({
        name,
        message,
        date: new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })
      });

      // Güncellenmiş diziyi kaydet
      await fetch(`${KVDB_BASE}/?email=${encodeURIComponent(USER_EMAIL)}&key=${ENTRIES_KEY}`, {
        method: 'POST',
        body: JSON.stringify(entries)
      });

      renderEntries(entries);
      nameInput.value = '';
      msgInput.value = '';
      statusEl.textContent = 'Mesajın eklendi, teşekkürler!';
      setTimeout(() => (statusEl.textContent = ''), 3000);
    } catch (err) {
      statusEl.textContent = 'Bir şeyler ters gitti, tekrar dener misin?';
    }
  });
</script>
</body>
</html>
