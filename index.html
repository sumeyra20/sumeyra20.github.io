<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seyahat Günlüğüm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">seyahatlerim<span class="dot">.</span></span>
  <a class="nav-back" href="misafirdefteri.html">✍️ Misafir Defteri</a>
</nav>

<header class="hero">
  <span class="blob b1"></span>
  <span class="blob b2"></span>
  <span class="blob b3"></span>
  <div class="hero-inner">
    <span class="eyebrow">Kişisel seyahat arşivi</span>
    <h1>Gittiğim yerler, <span class="accent">anlattığım</span> hikayeler</h1>
    <p class="hero-sub">Haritadaki pinlere tıkla, gezdiğim yerlerin hikayesini oku!</p>
  </div>
</header>

<section class="map-section">
  <div id="turkiye-map"></div>
</section>

<footer class="site-footer">
  <p>Kendi rotam · <span id="year"></span></p>
  <div style="margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.9rem; color: var(--ink-soft);">
    <span>👀 Toplam Ziyaretçi:</span>
    <img src="https://api.visitorbadge.io/api/visitors?path=https%3A%2F%2FYOUR_GITHUB_USERNAME.github.io%2Fseyahat-gunlugum&label=&countColor=%232f80ed&style=flat" alt="Ziyaretçi Sayısı" />
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // =========================================================================
  // Haritadaki pinler. Yeni bir yer eklemek için bu listeye bir satır ekle:
  //   { name: 'Yer adı', lat: enlem, lng: boylam, color: '#renk', href: 'sayfa.html' }
  // Enlem/boylam öğrenmek için Google Maps'te yere sağ tıklayıp koordinatları kopyalayabilirsin.
  // =========================================================================
  const yerler = [
    { name: 'Lapseki, Çanakkale', lat: 40.3411, lng: 26.6839, color: '#ffc93c', href: 'lapseki.html' },
  ];

  const map = L.map('turkiye-map', {
    scrollWheelZoom: false,
  }).setView([39.0, 35.2], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap katkıda bulunanlar',
    maxZoom: 18,
  }).addTo(map);

  yerler.forEach(yer => {
    const icon = L.divIcon({
      className: 'map-pin',
      html: `<span style="background:${yer.color}"></span>`,
      iconSize: [26, 26],
      iconAnchor: [13, 26],
    });
    const marker = L.marker([yer.lat, yer.lng], { icon }).addTo(map);
    marker.bindPopup(
      `<strong>${yer.name}</strong><br><a href="${yer.href}">Devamını oku →</a>`
    );
  });
</script>
</body>
</html>
