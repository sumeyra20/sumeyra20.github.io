<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misafir Defteri — Seyahat Günlüğüm</title>
<script>
  (function() {
    const saved = localStorage.getItem('theme');
    const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-brand">seyahatlerim<span class="dot">.</span></span>
  <div class="nav-right">
    <a class="nav-back" href="index.html">← Tüm gezilerim</a>
    <button id="theme-toggle" class="theme-toggle" aria-label="Karanlık modu değiştir">🌙</button>
  </div>
</nav>

<header class="hero" style="padding-bottom:1.5rem;">
  <span class="blob b1"></span>
  <span class="blob b2"></span>
  <span class="blob b3"></span>
  <div class="hero-inner">
    <span class="eyebrow">Herkese açık</span>
    <h1>Misafir <span class="accent">Defteri</span></h1>
    <p class="hero-sub">Buraya kısa bir not bırakabilirsin — bir anı, bir tavsiye, ya da sadece merhaba demek için.</p>
  </div>
</header>

<main class="gb-wrap">
  <form id="gb-form" class="gb-form">
    <div class="gb-row">
      <input id="gb-name" type="text" placeholder="Adın" maxlength="40" required>
    </div>
    <div class="gb-row">
      <textarea id="gb-message" placeholder="Mesajın..." maxlength="500" rows="3" required></textarea>
    </div>
    <button type="submit" class="gb-btn">Bırak</button>
    <p id="gb-status" class="gb-status"></p>
  </form>

  <div id="gb-entries" class="gb-entries">
    <p class="gb-loading">Mesajlar yükleniyor...</p>
  </div>
</main>

<footer class="site-footer">
  <p>Kendi rotam · <span id="year"></span></p>
</footer>

<!-- Firebase SDK (v10 JS Modules) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, addDoc, updateDoc, increment, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // FIREBASE AYARLARINIZ
  const firebaseConfig = {
    apiKey: "AIzaSyBGQauDgiCKPF6yMNXSO3EoKITZ90ww8_0", // Firebase konsolundaki apiKey değerini yazın
    authDomain: "misafir-defteri.firebaseapp.com", // Kendi Proje ID'nize göre güncelleyin
    projectId: "misafir-defteri", // Kendi Proje ID'nizi yazın
    storageBucket: "misafir-defteri.appspot.com",
    messagingSenderId: "1055261329396",
    appId: "1:1055261329396:web:203233de2e6e3c3d625ba1" // Uygulama kimliğiniz eklendi!
  };

  // Firebase Başlatma
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const messagesRef = collection(db, "guestbook");

  // Bu tarayıcıda beğenilen mesajların id'leri (basit, hesapsız beğeni takibi)
  const likedIds = new Set(JSON.parse(localStorage.getItem('likedGuestbook') || '[]'));

  // DOM Elemanları
  document.getElementById('year').textContent = new Date().getFullYear();
  const form = document.getElementById('gb-form');
  const nameInput = document.getElementById('gb-name');
  const msgInput = document.getElementById('gb-message');
  const statusEl = document.getElementById('gb-status');
  const entriesEl = document.getElementById('gb-entries');

  // Tema Değiştirici
  const themeToggle = document.getElementById('theme-toggle');
  function updateThemeIcon() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeToggle.textContent = isDark ? '☀️' : '🌙';
  }
  updateThemeIcon();
  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  });

  // CANLI MESAJ DİNLENMESİ (Real-time)
  const q = query(messagesRef, orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    if (snapshot.empty) {
      entriesEl.innerHTML = '<p class="gb-loading">Henüz mesaj yok — ilk mesajı sen bırak!</p>';
      return;
    }

    entriesEl.innerHTML = snapshot.docs.map(docSnap => {
      const data = docSnap.data();
      const id = docSnap.id;
      const likes = data.likes || 0;
      const liked = likedIds.has(id);
      return `
        <div class="gb-entry">
          <p class="gb-entry-name">${escapeHtml(data.name)}</p>
          <p class="gb-entry-msg">${escapeHtml(data.message)}</p>
          <div class="gb-entry-footer">
            <p class="gb-entry-date">${escapeHtml(data.date || '')}</p>
            <button type="button" class="gb-like-btn${liked ? ' is-liked' : ''}" data-id="${id}">
              ${liked ? '❤️' : '🤍'} <span>${likes}</span>
            </button>
          </div>
        </div>
      `;
    }).join('');
  }, (err) => {
    console.error("Firebase Hatası:", err);
    entriesEl.innerHTML = '<p class="gb-loading">Mesajlar yüklenirken bir hata oluştu.</p>';
  });

  // Beğeni butonlarına tıklama (liste her yeniden çizildiğinde elemanlar değiştiği için delegasyon kullanıyoruz)
  entriesEl.addEventListener('click', async (e) => {
    const btn = e.target.closest('.gb-like-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    const liked = likedIds.has(id);
    btn.disabled = true;
    try {
      await updateDoc(doc(db, 'guestbook', id), { likes: increment(liked ? -1 : 1) });
      if (liked) {
        likedIds.delete(id);
      } else {
        likedIds.add(id);
      }
      localStorage.setItem('likedGuestbook', JSON.stringify([...likedIds]));
    } catch (err) {
      console.error('Beğeni güncellenemedi:', err);
    } finally {
      btn.disabled = false;
    }
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // YENİ MESAJ GÖNDERME
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    const message = msgInput.value.trim();
    if (!name || !message) return;

    statusEl.style.color = 'var(--ink)';
    statusEl.textContent = 'Gönderiliyor...';

    try {
      await addDoc(messagesRef, {
        name: name,
        message: message,
        likes: 0,
        date: new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' }),
        createdAt: new Date()
      });

      nameInput.value = '';
      msgInput.value = '';
      statusEl.style.color = '#27ae60';
      statusEl.textContent = 'Mesajın eklendi, teşekkürler!';
      setTimeout(() => (statusEl.textContent = ''), 3000);
    } catch (err) {
      console.error("Mesaj Gönderim Hatası:", err);
      statusEl.style.color = '#e74c3c';
      statusEl.textContent = 'Bir şeyler ters gitti, tekrar dener misin?';
    }
  });
</script>
</body>
</html>
